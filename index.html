<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Household Chores — All Tasks</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #f3f8ff 0%, #eaf2ff 100%);
      color: #1f2a44;
    }
    .main-wrap {
      max-width: 1240px;
      margin: 0 auto;
      min-height: 100vh;
      background: #fff;
      border-left: 4px solid #dbe8ff;
      border-right: 4px solid #dbe8ff;
      box-shadow: 0 18px 48px rgba(38, 72, 120, 0.18);
    }
    .main-header {
      background: linear-gradient(180deg, #2f7bff 0%, #1f5fe0 100%);
      color: white;
      padding: 20px 18px 16px;
    }
    .main-header h1 {
      margin: 0 0 6px;
      font-size: 30px;
      line-height: 1.1;
    }
    .main-header p {
      margin: 0;
      font-size: 15px;
      opacity: 0.96;
    }
    .tabs {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      padding: 12px;
      background: #f7faff;
      border-bottom: 3px solid #dbe8ff;
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .tab-btn {
      border: none;
      border-radius: 14px;
      padding: 12px 10px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      background: #dfe9ff;
      color: #1f2a44;
      transition: transform .15s ease, background .15s ease;
      min-height: 46px;
    }
    .tab-btn.active {
      background: linear-gradient(180deg, #2f7bff 0%, #1f5fe0 100%);
      color: white;
      box-shadow: 0 8px 18px rgba(46, 108, 255, 0.22);
    }
    .panel {
      display: none;
      padding: 10px;
      background: #ffffff;
    }
    .panel.active {
      display: block;
    }
    .frame-wrap {
      width: 100%;
      border-radius: 18px;
      overflow: hidden;
      background: white;
      border: 2px solid #dbe8ff;
    }
    .frame {
      width: 100%;
      height: calc(100vh - 170px);
      min-height: 620px;
      border: none;
      background: white;
      display: block;
    }
    .mobile-tip {
      display: none;
    }
    @media (min-width: 821px) {
      body { padding: 22px; }
      .main-wrap {
        border: 4px solid #dbe8ff;
        border-radius: 30px;
        overflow: hidden;
      }
      .main-header { padding: 26px 30px 20px; }
      .main-header h1 { font-size: 36px; }
      .main-header p { font-size: 18px; }
      .tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        padding: 18px 22px;
      }
      .tab-btn {
        padding: 14px 22px;
        font-size: 18px;
        min-height: auto;
      }
      .panel { padding: 16px; }
      .frame {
        height: 85vh;
        min-height: 900px;
      }
    }
    @media (max-width: 820px) {
      .mobile-tip {
        display: block;
        margin: 10px 10px 0;
        padding: 12px 14px;
        background: #fff8d8;
        border: 2px solid #ffd84a;
        border-radius: 16px;
        font-size: 14px;
        line-height: 1.45;
        font-weight: 700;
        color: #374151;
      }
    }
    @media (max-width: 560px) {
      .main-header h1 { font-size: 24px; }
      .main-header p { font-size: 14px; }
      .tabs { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .tab-btn {
        font-size: 14px;
        padding: 11px 8px;
      }
      .panel { padding: 8px; }
      .frame-wrap { border-radius: 14px; }
      .frame {
        height: calc(100vh - 235px);
        min-height: 560px;
      }
    }
  </style>
</head>
<body>
  <div class="main-wrap">
    <div class="main-header">
      <h1>Household Chores</h1>
      <p>All tasks in one file</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="flashcards">Flashcards</button>
      <button class="tab-btn" data-tab="speaking">Speaking</button>
      <button class="tab-btn" data-tab="email">Email</button>
      <button class="tab-btn" data-tab="grammar">Grammar</button>
    </div>

    <div class="mobile-tip">Upload this index file together with the 4 task files into the same GitHub folder.</div>

    <section class="panel active" id="flashcards-panel">
      <div class="frame-wrap">
        <iframe class="frame" src="household_chores_flashcards_only.html" title="Flashcards"></iframe>
      </div>
    </section>

    <section class="panel" id="speaking-panel">
      <div class="frame-wrap">
        <iframe class="frame" src="oge_speaking_daily_routine_one_page.html" title="Speaking"></iframe>
      </div>
    </section>

    <section class="panel" id="email-panel">
      <div class="frame-wrap">
        <iframe class="frame" src="oge_email_tasks_household_one_page.html" title="Email"></iframe>
      </div>
    </section>

    <section class="panel" id="grammar-panel">
      <div class="frame-wrap">
        <iframe class="frame" src="household_chores_grammar.html" title="Grammar"></iframe>
      </div>
    </section>
  </div>

  <script>
    const tabButtons = Array.from(document.querySelectorAll('.tab-btn'));
    const panels = {
      flashcards: document.getElementById('flashcards-panel'),
      speaking: document.getElementById('speaking-panel'),
      email: document.getElementById('email-panel'),
      grammar: document.getElementById('grammar-panel')
    };

    function openTab(name) {
      tabButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.tab === name));
      Object.entries(panels).forEach(([key, panel]) => {
        panel.classList.toggle('active', key === name);
      });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    tabButtons.forEach(btn => {
      btn.addEventListener('click', () => openTab(btn.dataset.tab));
    });
  </script>
</body>
</html>
